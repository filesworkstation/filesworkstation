<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - File Work Station</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- CDN For Instant Excel Sheet Generation (SheetJS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">

    <!-- Premium Admin Navigation Bar -->
    <nav class="p-4 border-b border-gray-200 bg-white flex justify-between items-center px-6 shadow-xs">
        <div>
            <h1 class="text-xl font-black tracking-widest text-blue-600 leading-none">FWS CONTROL CENTER</h1>
            <span class="text-[9px] font-bold text-gray-400 uppercase tracking-wider block mt-1">Live Order Management Panel</span>
        </div>
        <div class="flex gap-2">
            <!-- Excel Generation Engine Button Trigger -->
            <button onclick="window.exportToExcelSheet()" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold px-3 py-2 rounded-lg shadow-sm transition-all flex items-center gap-1 cursor-pointer">
                📊 Export to Excel
            </button>
            <a href="index.html" class="text-xs font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 px-3 py-2 rounded-lg transition-all">Go to Shop →</a>
        </div>
    </nav>

    <!-- Filter Search Engine Module Layout Grid -->
    <div class="max-w-7xl mx-auto p-4 mt-4">
        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-xs mb-4">
            <p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">🔍 Gali Search Engine Filter</p>
            <input type="text" id="adminSearchField" oninput="window.filterLiveOrders()" placeholder="Search by Student Name or 12-Digit UTR Number..." class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-xs focus:outline-none focus:border-blue-600 font-semibold">
        </div>

        <!-- Master Responsive Grid View Frame Table -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse" id="ordersMasterTable">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 text-[10px] font-black text-gray-400 uppercase tracking-wider">
                            <th class="p-3">Order Specs</th>
                            <th class="p-3">Janam Kundli Details</th>
                            <th class="p-3">Delivery Address / Location</th>
                            <th class="p-3">Financials / UTR</th>
                            <th class="p-3 text-right">Operational Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adminOrderRowsContainer" class="divide-y divide-gray-100 text-xs">
                        <!-- Live dynamic stream lines template row injects here -->
                        <tr id="initialAdminLoadingState">
                            <td colspan="5" class="text-center p-8 text-gray-400 text-xs">Streaming active databases pipelines securely from Firebase...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <!-- Real-Time Database Action Engine Controllers Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your Exact Project Database Credentials 
        const firebaseConfig = {
          apiKey: "AIzaSyBC7S5uJd9izO5qOV8W40T7KtNvGEk6oIU",
          authDomain: "filesworkstation-b3074.firebaseapp.com",
          projectId: "filesworkstation-b3074",
          storageBucket: "filesworkstation-b3074.firebasestorage.app",
          messagingSenderId: "922394201956",
          appId: "1:922394201956:web:7d18af7a9027103c0ab471"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let masterOrdersLocalCache = []; // Stores matching snapshots for real-time offline query filters

        // Database live listener pipeline
        onSnapshot(collection(db, "orders"), (snapshot) => {
            masterOrdersLocalCache = [];
            const container = document.getElementById('adminOrderRowsContainer');
            container.innerHTML = "";

            if (snapshot.empty) {
                container.innerHTML = `<tr><td colspan="5" class="text-center p-8 text-gray-400">No active orders found inside cloud clusters metadata nodes.</td></tr>`;
                return;
            }

            snapshot.forEach((docNode) => {
                const id = docNode.id;
                const data = docNode.data();
                masterOrdersLocalCache.push({ documentDocId: id, ...data });
            });

            renderTableRows(masterOrdersLocalCache);
        });

        // Renders table rows cleanly with full Janam Kundli specs
        function renderTableRows(ordersArray) {
            const container = document.getElementById('adminOrderRowsContainer');
            container.innerHTML = "";

            ordersArray.forEach((order) => {
                let statusBadgeColor = "bg-amber-50 text-amber-600 border-amber-200";
                if(order.status === "Approved") statusBadgeColor = "bg-green-50 text-green-600 border-green-200";
                if(order.status === "Rejected") statusBadgeColor = "bg-red-50 text-red-600 border-red-200";

                // Mapping values safely, adding fallbacks if older records lack fields
                const phone = order.phone || "N/A";
                const college = order.college || "N/A";
                const className = order.class || "N/A";
                const section = order.section || "N/A";
                const rollNo = order.rollNumber || "N/A";
                const address = order.address || "N/A";

                container.innerHTML += `
                    <tr class="hover:bg-gray-50/50 transition-colors order-table-data-row" data-name="${String(order.name).toLowerCase()}" data-utr="${String(order.utr).toLowerCase()}">
                        <td class="p-3 whitespace-nowrap">
                            <div class="font-extrabold text-gray-900">${order.item}</div>
                            <div class="text-[10px] text-gray-400 font-mono mt-0.5">ID: ${order.orderId}</div>
                        </td>
                        <td class="p-3">
                            <div class="font-bold text-blue-600 text-[13px]">${order.name}</div>
                            <div class="text-[11px] font-medium text-gray-600 mt-0.5">📞 Ph: ${phone}</div>
                            <div class="text-[10px] text-gray-400 mt-0.5">🏛️ ${college}</div>
                        </td>
                        <td class="p-3">
                            <div class="font-semibold text-gray-700">Class: ${className} | Sec: ${section}</div>
                            <div class="text-[10px] text-gray-400 font-mono mt-0.5">Roll No: ${rollNo}</div>
                            <div class="text-[11px] text-gray-500 font-medium max-w-xs mt-1 bg-gray-50 p-1.5 rounded border border-gray-100 break-words">📍 ${address}</div>
                        </td>
                        <td class="p-3 whitespace-nowrap">
                            <div class="font-black text-gray-900 text-sm">₹${order.amount} <span class="text-[10px] font-normal text-gray-400">(${order.quantity} pgs)</span></div>
                            <div class="text-[11px] font-mono font-bold text-purple-700 mt-1 bg-purple-50 px-1.5 py-0.5 rounded border border-purple-100">UTR: ${order.utr}</div>
                            <div class="mt-1.5"><span class="text-[9px] font-bold px-1.5 py-0.5 rounded border ${statusBadgeColor}">${order.status}</span></div>
                        </td>
                        <td class="p-3 text-right whitespace-nowrap">
                            <div class="flex justify-end gap-1.5">
                                <button onclick="window.updateOrderStatusState('${order.documentDocId}', 'Approved')" class="bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] font-black px-2.5 py-1.5 rounded shadow-xs uppercase tracking-wider cursor-pointer transition-all">Approve</button>
                                <button onclick="window.updateOrderStatusState('${order.documentDocId}', 'Rejected')" class="bg-rose-600 hover:bg-rose-700 text-white text-[10px] font-black px-2.5 py-1.5 rounded shadow-xs uppercase tracking-wider cursor-pointer transition-all">Reject</button>
                            </div>
                            <div class="mt-2">
                                <a href="${order.downloadUrl}" target="_blank" class="text-[10px] text-gray-400 hover:text-blue-600 font-bold underline transition-colors">View Master File 🖼️</a>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        // Live status updates operational engine logic
        window.updateOrderStatusState = async function(docId, targetStatus) {
            if(!confirm(`Are you sure you want to mark this order as ${targetStatus}?`)) return;
            try {
                const docRef = doc(db, "orders", docId);
                await updateDoc(docRef, { status: targetStatus });
                alert(`Order marked as ${targetStatus} successfully!`);
            } catch(err) {
                alert("Operation failed: " + err.message);
            }
        };

        // EXCEL SHEET EXPORT ENGINE INTERFACE
        window.exportToExcelSheet = function() {
            if(masterOrdersLocalCache.length === 0) { alert("No structured order data available to export!"); return; }
            
            // Format array to structured Excel columns mapping cleanly
            const excelRows = masterOrdersLocalCache.map(order => ({
                "Order ID": order.orderId || "N/A",
                "Student Name": order.name || "N/A",
                "WhatsApp Number": order.phone || "N/A",
                "School/College": order.college || "N/A",
                "Class": order.class || "N/A",
                "Section": order.section || "N/A",
                "Roll Number": order.rollNumber || "N/A",
                "Full Delivery Address": order.address || "N/A",
                "Document Package": order.item || "N/A",
                "Pages Count": order.quantity || 0,
                "Net Total Amount (₹)": order.amount || 0,
                "Transaction UTR": order.utr || "N/A",
                "Order Status": order.status || "Pending",
                "Submission Timestamp": order.timestamp || "N/A"
            }));

            const worksheet = XLSX.utils.json_to_sheet(excelRows);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "FWS Orders Log");
            
            // Generate date string for unique file naming
            const dateStr = new Date().toISOString().split('T')[0];
            XLSX.writeFile(workbook, `FWS_Master_Orders_${dateStr}.xlsx`);
        };

        // GALI SEARCH REAL-TIME OFFLINE CONTROLLER ENGINE
        window.filterLiveOrders = function() {
            const queryText = document.getElementById('adminSearchField').value.trim().toLowerCase();
            const allRows = document.querySelectorAll('.order-table-data-row');

            allRows.forEach((row) => {
                const name = row.getAttribute('data-name') || "";
                const utr = row.getAttribute('data-utr') || "";
                
                if(name.includes(queryText) || utr.includes(queryText)) {
                    row.classList.remove('hidden');
                } else {
                    row.classList.add('hidden');
                }
            });
        };
    </script>
</body>
</html>
