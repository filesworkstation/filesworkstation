<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - File Work Station</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .clickable-canvas { aspect-ratio: 1 / 1.414; max-width: 240px; position: relative; cursor: crosshair; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <nav class="sticky top-0 z-50 p-3 border-b border-gray-200 bg-white flex justify-center items-center shadow-sm">
        <h1 class="text-xl font-black tracking-widest text-blue-600">FILE WORK STATION - MASTER ADMIN</h1>
    </nav>

    <div class="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6 mt-4">
        
        <!-- LEFT: ORDERS LIST -->
        <div class="md:col-span-2 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-xl border shadow-sm">
                    <span class="text-[10px] font-bold text-gray-400 uppercase block">Pending Approvals</span>
                    <p id="pendingCount" class="text-2xl font-black text-amber-500">0</p>
                </div>
                <div class="bg-white p-4 rounded-xl border shadow-sm">
                    <span class="text-[10px] font-bold text-gray-400 uppercase block">Total Net Earnings</span>
                    <p id="revenueCount" class="text-2xl font-black text-green-600">₹0</p>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl border shadow-sm">
                <h2 class="text-xs font-bold text-gray-900 uppercase tracking-wider border-b pb-3 mb-4">Verification Pipeline</h2>
                <div id="orderQueueContainer" class="space-y-3">
                    <p class="text-xs text-gray-400 text-center py-4">Listening for live incoming orders from Firebase...</p>
                </div>
            </div>
        </div>

        <!-- RIGHT: UPLOAD NEW FILE TEMPLATE WITH CLICK POSITIONER -->
        <div class="bg-white p-5 rounded-xl border shadow-sm h-fit">
            <h2 class="text-xs font-bold text-gray-900 uppercase tracking-wider border-b pb-3 mb-4">Add New Template to Shop</h2>
            
            <div class="space-y-3 text-xs">
                <div>
                    <label class="block font-bold text-gray-500 uppercase mb-1">Template Title</label>
                    <input type="text" id="prodTitle" placeholder="e.g., Physics Side Box Page" class="w-full bg-gray-50 border rounded-lg p-2.5 text-xs focus:outline-none focus:border-blue-600">
                </div>
                <div>
                    <label class="block font-bold text-gray-500 uppercase mb-1">Price Per Page (₹)</label>
                    <input type="number" id="prodPrice" value="5" class="w-full bg-gray-50 border rounded-lg p-2.5 text-xs focus:outline-none focus:border-blue-600">
                </div>
                <div>
                    <label class="block font-bold text-gray-500 uppercase mb-1">Category</label>
                    <select id="prodCategory" class="w-full bg-gray-50 border rounded-lg p-2.5 text-xs focus:outline-none focus:border-blue-600">
                        <option value="Practical Files">Practical Files</option>
                        <option value="Holiday Homework">Holiday Homework</option>
                        <option value="Project Covers">Project Covers</option>
                    </select>
                </div>
                <div>
                    <label class="block font-bold text-gray-500 uppercase mb-1">Select Page Photo (📸 Camera/Gallery)</label>
                    <input type="file" id="prodImageFile" accept="image/*" onchange="window.previewSelectedImage(event)" class="w-full bg-gray-50 border rounded-lg p-2 text-xs">
                </div>

                <!-- VISUAL POSITION SELECTOR LOGIC -->
                <div id="positionSelectorZone" class="hidden border border-dashed border-blue-300 rounded-xl p-3 bg-blue-50/50 flex flex-col items-center">
                    <span class="text-[10px] text-blue-600 font-bold uppercase mb-1 block">⚠️ Photo par wahan click karo jahan Naam chahiye:</span>
                    <div id="canvasContainer" class="clickable-canvas bg-cover bg-center border rounded shadow-sm" onclick="window.markCoordinates(event)">
                        <!-- Target dot anchor locator marker -->
                        <div id="targetMarkerDot" class="absolute h-3 w-3 bg-red-600 border-2 border-white rounded-full -mt-1.5 -ml-1.5 hidden transition-all"></div>
                    </div>
                </div>
                
                <button onclick="window.uploadProductToShop()" id="uploadBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg uppercase tracking-wider mt-2 transition-all">
                    Publish Item Live
                </button>
            </div>
        </div>

    </div>

    <!-- Firebase Script Connector Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBC7S5uJd9izO5qOV8W40T7KtNvGEk6oIU",
          authDomain: "filesworkstation-b3074.firebaseapp.com",
          projectId: "filesworkstation-b3074",
          storageBucket: "filesworkstation-b3074.firebasestorage.app",
          messagingSenderId: "922394201956",
          appId: "1:922394201956:web:7d18af7a9027103c0ab471"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let totalRevenue = 0;
        let selectedPctX = 50; // Default center fallback percentages
        let selectedPctY = 50;
        let activeBase64String = "";

        // Orders stream snapshot updates channel
        onSnapshot(collection(db, "orders"), (snapshot) => {
            const container = document.getElementById('orderQueueContainer');
            let pendingCounter = 0; totalRevenue = 0; container.innerHTML = "";

            snapshot.forEach((documentSnapshot) => {
                const order = documentSnapshot.data();
                const docId = documentSnapshot.id;
                if (order.status === "Approved") totalRevenue += Number(order.amount) || 0;

                if (order.status === "Pending") {
                    pendingCounter++;
                    container.innerHTML += `
                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3">
                            <div>
                                <div class="flex items-center gap-2">
                                    <span class="font-extrabold text-sm text-gray-900">${order.name}</span>
                                    <span class="bg-blue-50 text-blue-600 text-[9px] font-bold px-1.5 py-0.5 rounded border border-blue-200">${order.quantity} Pages</span>
                                </div>
                                <p class="text-xs text-gray-400 mt-0.5">Item: ${order.item} | ID: ${order.orderId}</p>
                                <p class="text-[11px] font-mono text-blue-600 font-bold bg-white border border-gray-200 px-2 py-0.5 rounded inline-block mt-1">UTR: ${order.utr}</p>
                            </div>
                            <div class="flex items-center gap-2 justify-between">
                                <span class="text-base font-black text-gray-900 mr-2">₹${order.amount}</span>
                                <button onclick="window.changeStatus('${docId}', 'Approved')" class="bg-green-600 hover:bg-green-700 text-white font-bold text-[10px] px-3 py-1.5 rounded-lg uppercase">Approve</button>
                                <button onclick="window.changeStatus('${docId}', 'Rejected')" class="bg-red-500 hover:bg-red-600 text-white font-bold text-[10px] px-3 py-1.5 rounded-lg uppercase">Reject</button>
                            </div>
                        </div>
                    `;
                }
            });
            document.getElementById('pendingCount').innerText = pendingCounter;
            document.getElementById('revenueCount').innerText = `₹${totalRevenue}`;
            if (pendingCounter === 0) container.innerHTML = `<p class="text-center text-xs text-gray-400 py-6">All clear! 🎉</p>`;
        });

        async function changeStatus(docId, targetStatus) {
            try { await updateDoc(doc(db, "orders", docId), { status: targetStatus }); } catch (err) {}
        }
        window.changeStatus = changeStatus;

        // Image file reading converter hook
        window.previewSelectedImage = function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                activeBase64String = e.target.result;
                document.getElementById('canvasContainer').style.backgroundImage = `url('${activeBase64String}')`;
                document.getElementById('positionSelectorZone').classList.remove('hidden');
                
                // Reset placement pin to center on fresh card load
                const dot = document.getElementById('targetMarkerDot');
                dot.style.left = "50%"; dot.style.top = "50%";
                dot.classList.remove('hidden');
                selectedPctX = 50; selectedPctY = 50;
            };
            reader.readAsDataURL(file);
        };

        // Capture absolute position percentages on element coordinates bounding click matrix
        window.markCoordinates = function(event) {
            const bounds = event.currentTarget.getBoundingClientRect();
            const clickX = event.clientX - bounds.left;
            const clickY = event.clientY - bounds.top;

            selectedPctX = (clickX / bounds.width) * 100;
            selectedPctY = (clickY / bounds.height) * 100;

            const dot = document.getElementById('targetMarkerDot');
            dot.style.left = `${selectedPctX}%`;
            dot.style.top = `${selectedPctY}%`;
        };

        async function uploadProductToShop() {
            const title = document.getElementById('prodTitle').value.trim();
            const price = document.getElementById('prodPrice').value.trim();
            const category = document.getElementById('prodCategory').value;
            const btn = document.getElementById('uploadBtn');

            if (!title || !price || !activeBase64String) {
                alert("Please fill all inputs and click on image position coordinates!");
                return;
            }

            btn.innerText = "Publishing to Cloud...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "products"), {
                    title: title,
                    price: Number(price),
                    category: category,
                    imageUrl: activeBase64String,
                    posX: selectedPctX, // Coordinate system integration keys
                    posY: selectedPctY
                });

                alert(`Success! "${title}" is now live.`);
                location.reload();
            } catch (err) {
                alert("Upload process faulted!");
                btn.innerText = "Publish Item Live"; btn.disabled = false;
            }
        }
        window.uploadProductToShop = uploadProductToShop;
    </script>
</body>
</html>
