                </div>  
                <div>  
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1">🔢 Class Section</label>  
                    <input type="text" id="formStudentSection" placeholder="e.g. Sec-A" class="w-full bg-gray-50 border rounded-xl p-3 text-xs focus:outline-none focus:border-blue-600 font-semibold">

                <label class="block text-[10px] font-black text-gray-400 uppercase mb-1">🆔 Class Roll Number</label>

<div id="paymentGatewayPopupModal" class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">  
    <div class="bg-white rounded-3xl w-full max-w-sm p-5 shadow-2xl border border-gray-100 relative text-center">  
        <button onclick="window.cancelCheckoutGateway()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 font-black">✕</button>  
        <span class="inline-block bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider mb-3">Secure Payment Gateway</span>  
        <div class="bg-amber-50 border border-amber-200 rounded-2xl p-2 mb-4 flex items-center justify-center gap-2">  
            <span class="text-[10px] font-black uppercase text-amber-700">Session Ends In</span>  
            <span id="liveTimerCountdown" class="text-sm font-black text-amber-600 timer-blink font-mono">02:30</span>  
        </div>  
        <p class="text-xs text-gray-400 font-bold uppercase">Total Payment</p>  
        <h2 class="text-3xl font-black text-gray-900 mt-1 mb-4">₹<span id="checkoutPopupAmountLabel">0</span></h2>  
        <div class="flex justify-center mb-5">  
            <div id="qrcodeWrapper" class="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm"></div>  
        </div>  
        <div class="border-t border-gray-100 pt-4">  
            <input type="text" id="userPaymentUtr" placeholder="Enter UTR / Transaction ID" class="w-full bg-gray-50 border border-gray-200 rounded-2xl p-3 text-xs font-bold font-mono focus:outline-none focus:border-purple-500 mb-3">  
            <button onclick="window.submitFinalOrderToFirebase()" class="w-full bg-green-600 hover:bg-green-700 transition-all text-white font-black text-xs uppercase tracking-wider py-3 rounded-2xl shadow-lg">Verify & Submit 🚀</button>  
        </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBC7S5uJd9izO5qOV8W40T7KtNvGEk6oIU",
    authDomain: "filesworkstation-b3074.firebaseapp.com",
    projectId: "filesworkstation-b3074",
    storageBucket: "filesworkstation-b3074.firebasestorage.app",
    messagingSenderId: "922394201956",
    appId: "1:922394201956:web:7d18af7a9027103c0ab471"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let cartCacheItems = [];
let activeCheckoutPayload = null;
let timerIntervalNode = null;
let studentSavedDetailsObj = null;

document.addEventListener("DOMContentLoaded",()=>{
    renderCartStructurePipeline();
    syncLiveOrdersHistoryPipeline();
});

function renderCartStructurePipeline(){
    cartCacheItems = JSON.parse(localStorage.getItem('userCartDataItems')) || [];
    const container = document.getElementById('cartItemsListContainer');
    const footer = document.getElementById('cartTotalFooterWrapper');
    const totalCountLabel = document.getElementById('cartCountHeader');
    const cartSection = document.getElementById('cartMainSection');
    totalCountLabel.innerText = cartCacheItems.length;

    if(cartCacheItems.length === 0){
        cartSection.classList.add('hidden');
        return;
    }
    cartSection.classList.remove('hidden');
    container.innerHTML = "";
    let cartCumulativeSum = 0;

    cartCacheItems.forEach((item,index)=>{
        const priceNum = parseInt(item.price) || 0;
        cartCumulativeSum += priceNum;
        const displayPrice = priceNum === 0 ? "FREE" : `₹${priceNum}`;
        const actionButtonText = priceNum === 0 ? "Get PDF 📥" : "Order 🚚";
        
        const actualImg = item.shopImageUrl || item.imageUrl || 'https://cdn-icons-png.flaticon.com/512/337/337946.png';

        container.innerHTML += `
        <div class="smooth-card bg-gray-50 border border-gray-100 rounded-3xl p-3">
            <div class="flex gap-3">
                <img src="${actualImg}" class="w-20 h-24 rounded-2xl object-cover bg-white border border-gray-100 shrink-0">
                <div class="flex-1 min-w-0">
                    <div class="flex items-start justify-between gap-2">
                        <div class="min-w-0">
                            <h4 class="font-black text-sm text-gray-900 leading-tight break-words">${item.title}</h4>
                            <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wide mt-1">${item.selectedCategory || 'Practical File'}</p>
                        </div>
                        <span class="text-sm font-black ${priceNum === 0 ? 'text-green-600' : 'text-gray-900'}">${displayPrice}</span>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button onclick="window.initiateCartCheckout('SINGLE', ${index})" class="flex-1 bg-blue-600 hover:bg-blue-700 transition-all text-white text-[10px] font-black px-3 py-2.5 rounded-xl uppercase">${actionButtonText}</button>
                        <button onclick="window.removeCartItemByIndex(${index})" class="bg-red-50 hover:bg-red-100 transition-all text-red-600 text-[10px] font-black px-4 py-2.5 rounded-xl uppercase">✕</button>
                    </div>
                </div>
            </div>
        </div>`;
    });
    footer.classList.remove('hidden');
    document.getElementById('cartTotalAmountLabel').innerText = cartCumulativeSum;
}

window.removeCartItemByIndex = function(index){
    cartCacheItems.splice(index,1);
    localStorage.setItem('userCartDataItems', JSON.stringify(cartCacheItems));
    renderCartStructurePipeline();
    window.cancelCheckoutGateway();
};

window.initiateCartCheckout = function(mode,index=null){
    if(mode === 'SINGLE' && index !== null){
        const targetObj = cartCacheItems[index];
        const itemPrice = parseInt(targetObj.price) || 0;
        if(itemPrice === 0){
            const dlUrl = targetObj.deliverableFileUrl || "#";
            if(dlUrl !== "#"){
                alert("🎉 FREE PDF download started!");
                window.open(dlUrl,'_blank');
            }else{
                alert("Download link missing.");
            }
            return;
        }
    }

    let titleStr = "";
    let finalBillAmount = 0;
    let targetUrlsArray = [];
    let productImage = "";
    let productCategory = "";

    if(mode === 'CART_ALL'){
        titleStr = "Full Cart Print Pack";
        finalBillAmount = cartCacheItems.reduce((acc,curr)=> acc + (parseInt(curr.price) || 0),0);
        targetUrlsArray = ["CART_ALL_ITEMS"];
        productImage = cartCacheItems[0]?.shopImageUrl || cartCacheItems[0]?.imageUrl || "";
        productCategory = "Multiple Files";
    }else if(mode === 'SINGLE' && index !== null){
        const targetObj = cartCacheItems[index];
        titleStr = targetObj.title;
        finalBillAmount = parseInt(targetObj.price) || 0;
        targetUrlsArray = [targetObj.deliverableFileUrl || "#"];
        productImage = targetObj.shopImageUrl || targetObj.imageUrl || "";
        productCategory = targetObj.selectedCategory || "Practical File";
    }

    activeCheckoutPayload = {
        mode: mode,
        indexRef: index,
        title: titleStr,
        amount: finalBillAmount,
        urls: targetUrlsArray,
        productImage: productImage,
        productCategory: productCategory
    };
    window.openDeliveryModal();
};

window.cancelCheckoutGateway = function(){
    if(timerIntervalNode) clearInterval(timerIntervalNode);
    activeCheckoutPayload = null;
    studentSavedDetailsObj = null;
    document.getElementById('paymentGatewayPopupModal').classList.add('hidden');
    document.getElementById('userPaymentUtr').value = "";
};

window.openDeliveryModal = function(){
    if(!activeCheckoutPayload) return;
    document.getElementById('deliveryFormModal').classList.remove('hidden');
};

window.closeDeliveryModal = function(){
    document.getElementById('deliveryFormModal').classList.add('hidden');
};

window.processCheckoutPaymentQR = function(){
    const phone = document.getElementById('formStudentPhone').value.trim();
    const college = document.getElementById('formStudentCollege').value.trim();
    const course = document.getElementById('formStudentCourse').value.trim();
    const section = document.getElementById('formStudentSection').value.trim();
    const roll = document.getElementById('formStudentRoll').value.trim();
    const address = document.getElementById('formStudentAddress').value.trim();

    if(!phone || !college || !course || !section || !roll || !address){
        alert("Please fill all fields.");
        return;
    }

    studentSavedDetailsObj = { phone, college, course, section, roll, address };
    window.closeDeliveryModal();
    document.getElementById('paymentGatewayPopupModal').classList.remove('hidden');
    document.getElementById('checkoutPopupAmountLabel').innerText = activeCheckoutPayload.amount;

    const qrWrapper = document.getElementById('qrcodeWrapper');
    qrWrapper.innerHTML = "";
    const upiId = "adityahard@fam";
    const sanitizedTitle = encodeURIComponent(activeCheckoutPayload.title.substring(0,20));
    const upiUrl = `upi://pay?pa=${upiId}&pn=FileWorkStation&tn=${sanitizedTitle}&am=${activeCheckoutPayload.amount}&cu=INR`;

    new QRCode(qrWrapper,{ text: upiUrl, width: 170, height: 170 });
    startPaymentTimerCountdown();
};

function startPaymentTimerCountdown(){
    if(timerIntervalNode) clearInterval(timerIntervalNode);
    let timeAllocated = 150;
    const display = document.getElementById('liveTimerCountdown');
    timerIntervalNode = setInterval(()=>{
        let minutes = Math.floor(timeAllocated / 60);
        let seconds = timeAllocated % 60;
        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;
        display.innerText = `${minutes}:${seconds}`;
        if(--timeAllocated < 0){
            clearInterval(timerIntervalNode);
            alert("Session expired.");
            window.cancelCheckoutGateway();
        }
    },1000);
}

window.submitFinalOrderToFirebase = async function(){
    const utrValue = document.getElementById('userPaymentUtr').value.trim();
    if(!utrValue || utrValue.length < 6){
        alert("Please enter valid UTR number.");
        return;
    }
    if(!activeCheckoutPayload){
        alert("Session expired.");
        return;
    }

    const customGeneratedOrderId = "FWS" + Math.floor(100000 + Math.random() * 900000);
    const compressedPayload = {
        orderId: String(customGeneratedOrderId),
        item: String(activeCheckoutPayload.title),
        amount: Number(activeCheckoutPayload.amount),
        quantity: Number(activeCheckoutPayload.mode === 'CART_ALL' ? cartCacheItems.length : 1),
        phone: String(studentSavedDetailsObj.phone),
        college: String(studentSavedDetailsObj.college),
        class: String(studentSavedDetailsObj.course),
        section: String(studentSavedDetailsObj.section),
        rollNumber: String(studentSavedDetailsObj.roll),
        address: String(studentSavedDetailsObj.address),
        utr: String(utrValue),
        status: "Pending",
        downloadUrl: String(activeCheckoutPayload.urls[0]),
        productImage: String(activeCheckoutPayload.productImage || ""),
        productCategory: String(activeCheckoutPayload.productCategory || ""),
        timestamp: String(new Date().toISOString())
    };

    try{
        await addDoc(collection(db,"orders"), compressedPayload);
        let trackerList = JSON.parse(localStorage.getItem('myFwsOrders')) || [];
        trackerList.push(customGeneratedOrderId);
        localStorage.setItem('myFwsOrders', JSON.stringify(trackerList));

        if(activeCheckoutPayload.mode === 'CART_ALL'){
            localStorage.removeItem('userCartDataItems');
        }else if(activeCheckoutPayload.mode === 'SINGLE'){
            cartCacheItems.splice(activeCheckoutPayload.indexRef, 1);
            localStorage.setItem('userCartDataItems', JSON.stringify(cartCacheItems));
        }

        if(timerIntervalNode) clearInterval(timerIntervalNode);
        alert(`🎉 Order Placed Successfully!\nTracking ID: ${customGeneratedOrderId}`);
        renderCartStructurePipeline();
        window.cancelCheckoutGateway();
    }catch(err){
        alert("Firebase Error: " + err.message);
    }
};

function syncLiveOrdersHistoryPipeline(){
    const historyContainer = document.getElementById('ordersHistoryListContainer');
    const trackerList = JSON.parse(localStorage.getItem('myFwsOrders')) || [];
