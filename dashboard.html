<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - File Work Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <nav class="p-3 border-b border-gray-200 bg-white flex justify-between items-center px-6 shadow-sm">
        <h1 class="text-xl font-black tracking-widest text-blue-600 leading-none">FILE WORK STATION</h1>
        <a href="index.html" class="text-xs font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg transition-all">← Back to Shop</a>
    </nav>

    <div class="max-w-3xl mx-auto p-4 mt-6">
        <h2 class="text-lg font-black text-gray-900 uppercase tracking-wider mb-4">My Dashboard & Files</h2>
        
        <div id="studentDashboardBox" class="space-y-3">
            <div class="bg-white p-6 border rounded-xl text-center text-gray-400 text-xs">
                Fetching secure user order states from Firebase cloud stream pipelines...
            </div>
        </div>
    </div>

    <div id="html2pdfSandbox" style="position: absolute; left: -9999px; top: -9999px;"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your Exact Config Credentials
        const firebaseConfig = {
          apiKey: "AIzaSyBC7S5uJd9izO5qOV8W40T7KtNvGEk6oIU",
          authDomain: "filesworkstation-b3074.firebaseapp.com",
          projectId: "filesworkstation-b3074",
          storageBucket: "filesworkstation-b3074.firebasestorage.app",
          messagingSenderId: "922394201956",
          appId: "1:922394201956:web:7d18af7a9027103c0ab471"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const myOrderIds = JSON.parse(localStorage.getItem('myFwsOrders')) || [];
        const container = document.getElementById('studentDashboardBox');

        // FIXED PDF ENGINE: Waits for the image to fully load before generating PDF
        window.downloadAsPDF = function(base64Data, orderId) {
            const sandbox = document.getElementById('html2pdfSandbox');
            
            // Creating image element dynamically
            const imgElement = document.createElement('img');
            imgElement.src = base64Data;
            imgElement.style.width = "100%";
            imgElement.style.height = "100%";
            imgElement.style.objectFit = "contain";

            // Injecting inside container with exact A4 vector matrix layout
            sandbox.innerHTML = "";
            const wrapperDiv = document.createElement('div');
            wrapperDiv.style.width = "595px";
            wrapperDiv.style.height = "842px";
            wrapperDiv.style.display = "flex";
            wrapperDiv.style.justifyContent = "center";
            wrapperDiv.style.alignItems = "center";
            wrapperDiv.style.backgroundColor = "#ffffff";
            
            wrapperDiv.appendChild(imgElement);
            sandbox.appendChild(wrapperDiv);

            const pdfOptions = {
                margin: 0,
                filename: `FWS-Order-${orderId}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'pt', format: 'a4', orientation: 'portrait' }
            };

            // CRITICAL FIX: Trigger PDF generation ONLY after image is 100% loaded in DOM cache
            imgElement.onload = function() {
                // Short 300ms fallback timeout for slower devices to prevent blank renders
                setTimeout(() => {
                    html2pdf().set(pdfOptions).from(sandbox).save().then(() => {
                        sandbox.innerHTML = ""; // Flushes storage sandbox cache strings
                    }).catch((err) => {
                        alert("Error during PDF document generation.");
                    });
                }, 300);
            };
        };

        if (myOrderIds.length === 0) {
            container.innerHTML = `
                <div class="bg-white p-8 border rounded-xl text-center text-gray-400 text-xs shadow-sm">
                    <p>You haven't ordered any templates yet. Go back to shop to customize your first project sheet! 📁</p>
                </div>
            `;
        } else {
            // Firestore Real-Time Query Snapshots listening loop pipeline
            const q = query(collection(db, "orders"), where("orderId", "in", myOrderIds));
            onSnapshot(q, (snapshot) => {
                container.innerHTML = "";
                
                if (snapshot.empty) {
                    container.innerHTML = `<div class="text-center text-xs text-gray-400 py-4">No data records found matching current device session token.</div>`;
                    return;
                }
                
                snapshot.forEach((doc) => {
                    const order = doc.data();
                    let badgeStyle = "bg-amber-50 text-amber-600 border-amber-200";
                    let actionBtn = `<button class="bg-gray-100 text-gray-400 font-bold text-[10px] px-3 py-2 rounded-lg cursor-not-allowed" disabled>Verifying Payment</button>`;

                    // Live state status evaluations mapping
                    if (order.status === "Approved") {
                        badgeStyle = "bg-green-50 text-green-600 border-green-200";
                        actionBtn = `<button onclick="window.downloadAsPDF('${order.downloadUrl}', '${order.orderId}')" class="bg-blue-600 hover:bg-blue-700 text-center text-white font-bold text-[10px] px-4 py-2 rounded-lg transition-all block shadow-sm shadow-blue-200 cursor-pointer">Download PDF File</button>`;
                    } else if (order.status === "Rejected") {
                        badgeStyle = "bg-red-50 text-red-600 border-red-200";
                        actionBtn = `<span class="text-xs font-bold text-red-500 bg-red-50 border border-red-100 px-2 py-1 rounded">UTR Declined / Fraud</span>`;
                    }

                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col sm:flex-row justify-between sm:items-center gap-3">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="font-extrabold text-sm text-gray-900">${order.item}</span>
                                    <span class="text-[9px] font-bold px-1.5 py-0.5 rounded border ${badgeStyle}">${order.status}</span>
                                </div>
                                <p class="text-xs text-gray-400">ID: <span class="font-mono text-gray-600">${order.orderId}</span> | Pages: ${order.quantity} | Student Name: <span class="text-blue-600 font-semibold">${order.name}</span></p>
                            </div>
                            <div class="flex items-center justify-between sm:justify-end gap-4 border-t sm:border-t-0 pt-2 sm:pt-0">
                                <span class="text-sm font-black text-gray-900">₹${order.amount}</span>
                                ${actionBtn}
                            </div>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
