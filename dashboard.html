<!DOCTYPE html>
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>FWS Dashboard - Smart Orders</title>  
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">  
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>  
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>  
<style>  
body{ font-family:'Inter',sans-serif; background:#f5f7fb; }  
@keyframes blinker{ 50%{ opacity:0.4; } }  
.timer-blink{ animation:blinker 1s linear infinite; }  
.glass-card{ background:rgba(255,255,255,0.96); backdrop-filter:blur(10px); }  
.smooth-card{ transition:all .2s ease; }  
.hide-scroll::-webkit-scrollbar{ width:0; }  
</style>  
</head>  
<body class="text-gray-800 min-h-screen pb-12">
<nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 px-4 py-3 shadow-sm">  
<div class="max-w-5xl mx-auto flex items-center justify-between gap-3">  
<a href="index.html" class="bg-gray-100 hover:bg-gray-200 transition-all px-4 py-2 rounded-2xl text-xs font-black text-gray-700 shrink-0">← Continue</a>  
<div class="text-center">  
<h1 class="text-lg font-black tracking-widest text-blue-600 uppercase leading-none">FWS Dashboard</h1>  
<p class="text-[10px] text-gray-400 font-bold mt-1 tracking-wide uppercase">Track Orders & Manage Files</p>  
</div>  
<div class="w-[90px]"></div>  
</div>  
</nav>
<div class="max-w-5xl mx-auto p-3 sm:p-4 space-y-5 mt-2">
    <!-- CART SECTION -->
    <div id="cartMainSection" class="hidden glass-card rounded-3xl border border-gray-100 shadow-sm p-4 sm:p-5">  
        <div class="flex items-center justify-between mb-4">  
            <div>  
                <h2 class="text-sm font-black uppercase tracking-wider text-gray-800">🛒 Shopping Cart</h2>  
                <p class="text-[10px] text-gray-400 font-semibold mt-1 uppercase">Ready for checkout</p>  
            </div>  
            <div class="bg-blue-50 text-blue-700 text-xs font-black px-3 py-2 rounded-2xl"><span id="cartCountHeader">0</span> Items</div>  
        </div>  
        <div id="cartItemsListContainer" class="space-y-3 max-h-[350px] overflow-y-auto hide-scroll"></div>  
        <div id="cartTotalFooterWrapper" class="hidden mt-5 pt-4 border-t border-gray-100 flex-col sm:flex-row items-center justify-between gap-4">  
            <div>  
                <p class="text-[10px] text-gray-400 uppercase font-black tracking-wider">Total Amount</p>  
                <h3 class="text-2xl font-black text-green-600">₹<span id="cartTotalAmountLabel">0</span></h3>  
            </div>  
            <div class="flex gap-2 w-full sm:w-auto">
                <button onclick="window.initiateCartCheckout('CART_ALL')" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 transition-all text-white font-black text-xs uppercase tracking-widest px-6 py-3 rounded-2xl shadow-lg cursor-pointer">Checkout 🚀</button>
            </div>
        </div>  
    </div>
    <!-- ORDERS HISTORY -->
    <div class="glass-card rounded-3xl border border-gray-100 shadow-sm p-4 sm:p-5">  
        <div class="flex items-center justify-between mb-5">  
            <div>  
                <h2 class="text-sm font-black uppercase tracking-wider text-gray-800">📦 Order Tracking</h2>  
                <p class="text-[10px] text-gray-400 font-semibold mt-1 uppercase">Recent activity & delivery updates</p>  
            </div>  
        </div>  
        <div id="ordersHistoryListContainer" class="space-y-4">  
            <p class="text-xs text-gray-400 text-center py-8">Fetching database records...</p>  
        </div>  
    </div>  
</div>
<!-- Delivery Info Modal -->
<div id="deliveryFormModal" class="fixed inset-0 z-50 hidden bg-black/50 backdrop-blur-xs flex items-center justify-center p-4 overflow-y-auto">  
    <div class="bg-white rounded-2xl w-full max-w-md p-5 shadow-xl border border-gray-100 max-h-[90vh] overflow-y-auto">  
        <h3 class="text-sm font-black text-gray-900 uppercase tracking-wider mb-4 pb-2 border-b">🚚 Delivery Specifications</h3>  
        <div class="space-y-3.5">  
            <div><label class="block text-[10px] font-black text-gray-400 uppercase mb-1">📞 WhatsApp Number</label><input type="tel" id="formStudentPhone" placeholder="Enter 10 digit phone number" class="w-full bg-gray-50 border rounded-xl p-3 text-xs focus:outline-none focus:border-blue-600 font-semibold"></div>  
            <div><label class="block text-[10px] font-black text-gray-400 uppercase mb-1">🏛️ School / University</label><input type="text" id="formStudentCollege" placeholder="e.g. GLA University" class="w-full bg-gray-50 border rounded-xl p-3 text-xs focus:outline-none focus:border-blue-600 font-semibold"></div>  
            <div class="grid grid-cols-2 gap-2">  
                <div><label class="block text-[10px] font-black text-gray-400 uppercase mb-1">🏫 Class Name</label><input type="text" id="formStudentCourse" placeholder="e.g. B.Tech" class="w-full bg-gray-50 border rounded-xl p-3 text-xs focus:outline-none focus:border-blue-600 font-semibold"></div>  
                <div><label class="block text-[10px] font-black text-gray-400 uppercase mb-1">🔢 Section</label><input type="text" id="formStudentSection" placeholder="e.g. Sec-A" class="w-full bg-gray-50 border rounded-xl p-3 text-xs focus:outline-none focus:border-blue-600 font-semibold"></div>  
            </div>  
            <div><label class="block text-[10px] font-black text-gray-400 uppercase mb-1">🆔 Roll Number</label><input type="text" id="formStudentRoll" placeholder="Enter roll number" class="w-full bg-gray-50 border rounded-xl p-3 text-xs focus:outline-none focus:border-blue-600 font-semibold"></div>  
            <div><label class="block text-[10px] font-black text-gray-400 uppercase mb-1">📍 Delivery Address</label><textarea id="formStudentAddress" rows="2" placeholder="Hostel / Room / Area" class="w-full bg-gray-50 border rounded-xl p-3 text-xs focus:outline-none focus:border-blue-600 font-semibold resize-none"></textarea></div>  
        </div>  
        <div class="grid grid-cols-2 gap-3 mt-5 border-t pt-4">  
            <button onclick="window.closeDeliveryModal()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs font-bold py-3 rounded-xl uppercase">Cancel</button>  
            <button onclick="window.processCheckoutPaymentQR()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-black py-3 rounded-xl uppercase">Confirm QR</button>  
        </div>  
    </div>  
</div>
<!-- Payment QR Modal -->
<div id="paymentGatewayPopupModal" class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">  
    <div class="bg-white rounded-3xl w-full max-w-sm p-5 shadow-2xl border border-gray-100 relative text-center">  
        <button onclick="window.cancelCheckoutGateway()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 font-black">✕</button>  
        <span class="inline-block bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider mb-3">Secure Payment</span>  
        <div class="bg-amber-50 border border-amber-200 rounded-2xl p-2 mb-4 flex items-center justify-center gap-2"><span class="text-[10px] font-black uppercase text-amber-700">Session Ends In</span><span id="liveTimerCountdown" class="text-sm font-black text-amber-600 timer-blink font-mono">02:30</span></div>  
        <p class="text-xs text-gray-400 font-bold uppercase">Total Payment</p>  
        <h2 class="text-3xl font-black text-gray-900 mt-1 mb-4">₹<span id="checkoutPopupAmountLabel">0</span></h2>  
        <div class="flex justify-center mb-5"><div id="qrcodeWrapper" class="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm"></div></div>  
        <div class="border-t border-gray-100 pt-4">  
            <input type="text" id="userPaymentUtr" placeholder="Enter UTR / Transaction ID" class="w-full bg-gray-50 border border-gray-200 rounded-2xl p-3 text-xs font-bold font-mono focus:outline-none focus:border-purple-500 mb-3">  
            <button onclick="window.submitFinalOrderToFirebase()" class="w-full bg-green-600 hover:bg-green-700 transition-all text-white font-black text-xs uppercase tracking-wider py-3 rounded-2xl shadow-lg">Verify & Submit 🚀</button>  
        </div>  
    </div>  
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBC7S5uJd9izO5qOV8W40T7KtNvGEk6oIU",
    authDomain: "filesworkstation-b3074.firebaseapp.com",
    projectId: "filesworkstation-b3074",
    storageBucket: "filesworkstation-b3074.firebasestorage.app",
    messagingSenderId: "922394201956",
    appId: "1:922394201956:web:7d18af7a9027103c0ab471"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let cartCacheItems = [];
let activeCheckoutPayload = null;
let timerIntervalNode = null;
let studentSavedDetailsObj = null;

// ADMIN WHATSAPP NUMBER (TERA NUMBER DAAL DIYA)
const ADMIN_WHATSAPP = "919457906960";

document.addEventListener("DOMContentLoaded",()=>{
    renderCart();
    syncOrders();
});
function renderCart(){
    cartCacheItems = JSON.parse(localStorage.getItem('userCartDataItems')) || [];
    const container = document.getElementById('cartItemsListContainer');
    const footer = document.getElementById('cartTotalFooterWrapper');
    const totalCountLabel = document.getElementById('cartCountHeader');
    const cartSection = document.getElementById('cartMainSection');
    totalCountLabel.innerText = cartCacheItems.length;

    if(cartCacheItems.length === 0){
        cartSection.classList.add('hidden');
        return;
    }
    cartSection.classList.remove('hidden');
    container.innerHTML = "";
    let total = 0;

    cartCacheItems.forEach((item,index)=>{
        const priceNum = parseInt(item.price) || 0;
        total += priceNum;
        const displayPrice = priceNum === 0 ? "FREE" : `₹${priceNum}`;
        const actionText = priceNum === 0 ? "Get PDF 📥" : "Order 🚚";
        const imgUrl = item.shopImageUrl || item.imageUrl || 'https://cdn-icons-png.flaticon.com/512/337/337946.png';

        container.innerHTML += `
        <div class="smooth-card bg-gray-50 border border-gray-100 rounded-3xl p-3">
            <div class="flex gap-3">
                <img src="${imgUrl}" class="w-20 h-24 rounded-2xl object-cover bg-white border border-gray-100 shrink-0">
                <div class="flex-1 min-w-0">
                    <div class="flex items-start justify-between gap-2">
                        <div><h4 class="font-black text-sm text-gray-900">${item.title}</h4><p class="text-[10px] text-gray-400 uppercase font-bold">${item.selectedCategory || 'File'}</p></div>
                        <span class="text-sm font-black ${priceNum === 0 ? 'text-green-600' : 'text-gray-900'}">${displayPrice}</span>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button onclick="window.initiateCheckout(${index})" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-black px-3 py-2.5 rounded-xl uppercase">${actionText}</button>
                        <button onclick="window.removeItem(${index})" class="bg-red-50 hover:bg-red-100 text-red-600 text-[10px] font-black px-4 py-2.5 rounded-xl">✕</button>
                    </div>
                </div>
            </div>
        </div>`;
    });
    footer.classList.remove('hidden');
    document.getElementById('cartTotalAmountLabel').innerText = total;
}

window.removeItem = function(index){
    cartCacheItems.splice(index,1);
    localStorage.setItem('userCartDataItems', JSON.stringify(cartCacheItems));
    renderCart();
    window.cancelCheckout();
};
window.initiateCheckout = function(index){
    const item = cartCacheItems[index];
    const priceNum = parseInt(item.price) || 0;
    if(priceNum === 0){
        if(item.deliverableFileUrl && item.deliverableFileUrl !== "#"){
            alert("🎉 FREE PDF! Downloading...");
            window.open(item.deliverableFileUrl,'_blank');
        } else { alert("No download link"); }
        return;
    }
    activeCheckoutPayload = {
        mode: 'SINGLE',
        index: index,
        title: item.title,
        amount: priceNum,
        itemsList: [{ title: item.title, price: priceNum, category: item.selectedCategory }]
    };
    document.getElementById('deliveryFormModal').classList.remove('hidden');
};

window.initiateCartCheckout = function(){
    if(cartCacheItems.length === 0) return;
    const totalAmount = cartCacheItems.reduce((a,b)=> a + (parseInt(b.price)||0),0);
    activeCheckoutPayload = {
        mode: 'CART_ALL',
        title: `Cart Pack (${cartCacheItems.length} items)`,
        amount: totalAmount,
        itemsList: cartCacheItems.map(i => ({ title: i.title, price: parseInt(i.price)||0, category: i.selectedCategory }))
    };
    document.getElementById('deliveryFormModal').classList.remove('hidden');
};

window.closeDeliveryModal = function(){
    document.getElementById('deliveryFormModal').classList.add('hidden');
};

window.cancelCheckout = function(){
    if(timerIntervalNode) clearInterval(timerIntervalNode);
    activeCheckoutPayload = null;
    studentSavedDetailsObj = null;
    document.getElementById('paymentGatewayPopupModal').classList.add('hidden');
};
window.processCheckoutPaymentQR = function(){
    const phone = document.getElementById('formStudentPhone').value.trim();
    const college = document.getElementById('formStudentCollege').value.trim();
    const course = document.getElementById('formStudentCourse').value.trim();
    const section = document.getElementById('formStudentSection').value.trim();
    const roll = document.getElementById('formStudentRoll').value.trim();
    const address = document.getElementById('formStudentAddress').value.trim();

    if(!phone || !college || !course || !section || !roll || !address){
        alert("Please fill all fields."); return;
    }
    if(phone.length < 10){ alert("Valid 10-digit phone required"); return; }

    studentSavedDetailsObj = { phone, college, course, section, roll, address };
    document.getElementById('deliveryFormModal').classList.add('hidden');
    document.getElementById('paymentGatewayPopupModal').classList.remove('hidden');
    document.getElementById('checkoutPopupAmountLabel').innerText = activeCheckoutPayload.amount;

    const qrWrapper = document.getElementById('qrcodeWrapper');
    qrWrapper.innerHTML = "";
    const upiUrl = `upi://pay?pa=adityahard@fam&pn=FWS&am=${activeCheckoutPayload.amount}&cu=INR`;
    new QRCode(qrWrapper,{ text: upiUrl, width: 170, height: 170 });
    
    if(timerIntervalNode) clearInterval(timerIntervalNode);
    let timeLeft = 150;
    const timerDisplay = document.getElementById('liveTimerCountdown');
    timerIntervalNode = setInterval(()=>{
        let mins = Math.floor(timeLeft/60);
        let secs = timeLeft%60;
        timerDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        if(--timeLeft < 0){ clearInterval(timerIntervalNode); alert("Session expired"); window.cancelCheckout(); }
    },1000);
};
window.submitFinalOrderToFirebase = async function(){
    const utrValue = document.getElementById('userPaymentUtr').value.trim();
    if(!utrValue || utrValue.length < 6){ alert("Enter valid UTR"); return; }
    if(!activeCheckoutPayload){ alert("Session expired"); return; }

    const orderId = "FWS" + Math.floor(100000 + Math.random() * 900000);
    
    // Prepare order summary for WhatsApp
    let itemsText = "";
    let totalPrice = 0;
    activeCheckoutPayload.itemsList.forEach((itm, idx) => {
        itemsText += `${idx+1}. ${itm.title} - ₹${itm.price}\n`;
        totalPrice += itm.price;
    });
    
    const customerPhone = studentSavedDetailsObj.phone;
    const whatsappMessage = `✅ *ORDER CONFIRMED* ✅
    
🆔 Order ID: ${orderId}
📅 Date: ${new Date().toLocaleString()}

📦 *ITEMS ORDERED:*
${itemsText}

💰 *TOTAL: ₹${totalPrice}*

👤 *CUSTOMER DETAILS:*
📞 WhatsApp: ${studentSavedDetailsObj.phone}
🏛️ College: ${studentSavedDetailsObj.college}
🏫 Class: ${studentSavedDetailsObj.course} (${studentSavedDetailsObj.section})
🆔 Roll: ${studentSavedDetailsObj.roll}
📍 Address: ${studentSavedDetailsObj.address}

💳 UTR: ${utrValue}
📌 Status: Payment Verification Pending

Thank you for shopping at File Work Station! 📚`;

    const encodedMsg = encodeURIComponent(whatsappMessage);
    // 🔥 TERA NUMBER PE REDIRECT HOGA PRE-TYPED MESSAGE KE SAATH 🔥
    const whatsappUrl = `https://wa.me/${ADMIN_WHATSAPP}?text=${encodedMsg}`;
    
    // Save to Firebase
    const orderData = {
        orderId: orderId,
        item: activeCheckoutPayload.title,
        amount: activeCheckoutPayload.amount,
        phone: studentSavedDetailsObj.phone,
        college: studentSavedDetailsObj.college,
        class: studentSavedDetailsObj.course,
        section: studentSavedDetailsObj.section,
        rollNumber: studentSavedDetailsObj.roll,
        address: studentSavedDetailsObj.address,
        utr: utrValue,
        status: "Pending",
        items: activeCheckoutPayload.itemsList,
        timestamp: new Date().toISOString()
    };
    
    try{
        await addDoc(collection(db,"orders"), orderData);
        
        let tracker = JSON.parse(localStorage.getItem('myFwsOrders')) || [];
        tracker.push(orderId);
        localStorage.setItem('myFwsOrders', JSON.stringify(tracker));
        
        // Clear cart
        if(activeCheckoutPayload.mode === 'CART_ALL'){
            cartCacheItems = [];
        } else {
            cartCacheItems.splice(activeCheckoutPayload.index, 1);
        }
        localStorage.setItem('userCartDataItems', JSON.stringify(cartCacheItems));
        
        if(timerIntervalNode) clearInterval(timerIntervalNode);
        
        alert(`🎉 Order Placed! ID: ${orderId}\nRedirecting to WhatsApp...`);
        window.cancelCheckout();
        renderCart();
        
        // 🔥 REDIRECT TO WHATSAPP WITH ALL DETAILS 🔥
        window.location.href = whatsappUrl;
        
    } catch(err){
        alert("Error: " + err.message);
    }
};
function syncOrders(){
    const historyContainer = document.getElementById('ordersHistoryListContainer');
    const trackerList = JSON.parse(localStorage.getItem('myFwsOrders')) || [];
    if(trackerList.length === 0){
        historyContainer.innerHTML = `<div class="text-center py-10"><div class="text-5xl mb-3">📦</div><h3 class="text-sm font-black">No Orders Yet</h3></div>`;
        return;
    }
    onSnapshot(collection(db,"orders"), (snapshot)=>{
        let html = "";
        snapshot.forEach(doc=>{
            const data = doc.data();
            if(trackerList.includes(data.orderId)){
                let statusBadge = `<span class="bg-amber-100 text-amber-700 text-[10px] px-3 py-1 rounded-full">Pending</span>`;
                if(data.status === "Approved") statusBadge = `<span class="bg-blue-100 text-blue-700">Out For Delivery 🚚</span>`;
                if(data.status === "Delivered") statusBadge = `<span class="bg-green-100 text-green-700">Delivered ✅</span>`;
                html += `
                <div class="bg-white border rounded-3xl p-3 shadow-sm">
                    <div class="flex justify-between items-start">
                        <div><h3 class="font-black text-sm">${data.item}</h3><p class="text-[10px] text-gray-400">${data.orderId}</p></div>
                        ${statusBadge}
                    </div>
                    <div class="flex justify-between mt-2"><span class="text-xs font-black">₹${data.amount}</span><span class="text-[10px] text-gray-400">${data.timestamp ? new Date(data.timestamp).toLocaleDateString() : ''}</span></div>
                </div>`;
            }
        });
        historyContainer.innerHTML = html || `<p class="text-xs text-center py-8">No orders found</p>`;
    });
}

window.renderCart = renderCart;
window.syncOrders = syncOrders;
</script>
</body>
</html>
