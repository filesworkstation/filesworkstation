<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Work Station - Premium Academic Templates</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .product-card { transition: all 0.2s ease-in-out; }
        .product-card:hover { transform: translateY(-2px); box-shadow: 0 8px 16px -6px rgba(0, 0, 0, 0.08); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <nav class="sticky top-0 z-50 border-b border-gray-200 bg-white/90 backdrop-blur-md px-4 py-2.5 flex justify-between items-center shadow-sm">
        <div class="w-10"></div> 
        <div class="text-center flex-grow">
            <h1 class="text-xl font-black tracking-widest text-blue-600 leading-none">FILE WORK STATION</h1>
            <span class="text-[9px] font-bold tracking-widest text-gray-400 block uppercase mt-0.5">Premium Academic Templates</span>
        </div>
        <div class="text-right">
            <a href="dashboard.html" class="inline-flex items-center gap-1 bg-blue-50 text-blue-600 text-[10px] font-bold px-2.5 py-1.5 rounded-lg border border-blue-200 transition-all">My Orders 📦</a>
        </div>
    </nav>

    <header class="pt-6 pb-4 px-6 text-center max-w-3xl mx-auto">
        <h2 class="text-2xl font-black md:text-4xl tracking-tight text-gray-900 mb-1">Premium Print-Ready <span class="text-blue-600">Academic Files</span></h2>
        <p class="text-gray-500 text-xs md:text-sm max-w-lg mx-auto">High-quality practical pages, indices, and front sheets for academic submissions.</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 pt-4 pb-20">
        <h3 class="text-[10px] font-bold tracking-widest text-gray-400 uppercase mb-3 px-1">Available Documents</h3>
        
        <div id="dynamicShopGrid" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4">
            <p class="text-xs text-gray-400 col-span-full text-center py-8">Loading available cloud collection catalog templates...</p>
        </div>
    </main>

    <footer class="p-4 bg-white border-t text-center text-[10px] text-gray-400 font-medium">&copy; 2026 Powered by File Work Station.</footer>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBC7S5uJd9izO5qOV8W40T7KtNvGEk6oIU",
          authDomain: "filesworkstation-b3074.firebaseapp.com",
          projectId: "filesworkstation-b3074",
          storageBucket: "filesworkstation-b3074.firebasestorage.app",
          messagingSenderId: "922394201956",
          appId: "1:922394201956:web:7d18af7a9027103c0ab471"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const grid = document.getElementById('dynamicShopGrid');

        // Snapshot stream mapping elements from data cluster pipeline
        onSnapshot(collection(db, "products"), (snapshot) => {
            grid.innerHTML = "";
            if (snapshot.empty) {
                grid.innerHTML = `<p class="text-xs text-gray-400 col-span-full text-center py-8">No products found. Open Admin to upload custom practical templates!</p>`;
                return;
            }
            snapshot.forEach((doc) => {
                const prod = doc.data();
                const textPosition = prod.placement || "center"; 
                
                grid.innerHTML += `
                    <div class="product-card bg-white rounded-xl border border-gray-200 overflow-hidden flex flex-col justify-between shadow-sm p-3 group">
                        <div class="relative bg-gray-100 aspect-[3/4] flex items-center justify-center border rounded-lg overflow-hidden mb-2">
                            <img src="${prod.imageUrl}" class="w-full h-full object-cover" alt="Practical Page View">
                            <span class="absolute top-1.5 left-1.5 bg-blue-600 text-white text-[8px] font-bold px-1.5 py-0.5 rounded uppercase tracking-wider shadow-sm">Live Format</span>
                        </div>
                        <div>
                            <h4 class="font-bold text-xs text-gray-900 line-clamp-2 leading-tight mb-1 group-hover:text-blue-600 transition-colors">${prod.title}</h4>
                            <div class="flex justify-between items-baseline mt-2 mb-2">
                                <span class="text-xs font-extrabold text-gray-900">₹${prod.price} <span class="text-[9px] font-normal text-gray-400">/ page</span></span>
                            </div>
                            <button onclick="window.openProduct('${prod.title.replace(/'/g, "\\'")}', ${prod.price}, '${prod.imageUrl}', '${textPosition}')" class="w-full bg-gray-950 hover:bg-blue-600 text-white font-bold text-[11px] py-1.5 rounded-lg transition-all">
                                Customize & Get File
                            </button>
                        </div>
                    </div>
                `;
            });
        });

        // Redirect engine setting localized parameters before changing screens
        function openProduct(title, price, imgString, placement) {
            localStorage.setItem('selectedTitle', title);
            localStorage.setItem('selectedPrice', price);
            localStorage.setItem('deliverableFileUrl', imgString); 
            localStorage.setItem('shopImageUrl', imgString); // Patch: Explicitly sets shop image reference to fix white preview screen
            localStorage.setItem('textPlacement', placement);      
            window.location.href = 'preview.html'; 
        }
        window.openProduct = openProduct;
    </script>
</body>
</html>
